# ~/.tmux.conf
# Dotfiles: github.com/yourname/dotfiles

# ─────────────────────────────────────────────
#  General
# ─────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on
setw -g aggressive-resize on
set -g history-limit 50000
set -sg escape-time 10

# True color (matches WezTerm Tokyo Night)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:Tc"
set -ag terminal-overrides ",xterm*:Tc"
set -ag terminal-overrides ",wezterm*:Tc"

# ─────────────────────────────────────────────
#  Tokyo Night colors
# ─────────────────────────────────────────────
set -g pane-border-style "fg=#1e2030"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines heavy

set -g status-position bottom
set -g status-style "bg=#15161e,fg=#565f89"
set -g status-left-style "fg=#7aa2f7,bold"
set -g status-right-style "fg=#565f89"
set -g status-left "#[fg=#7aa2f7]#{session_name} "
set -g status-right "#{?client_prefix,#[fg=#e0af68]PREFIX ,}#{?window_zoomed_flag,#[fg=#e0af68]Z ,}#[fg=#565f89]%H:%M "
set -g status-left-length 20
set -g status-right-length 50

setw -g window-status-style "fg=#565f89,bg=#15161e"
setw -g window-status-current-style "fg=#7aa2f7,bg=#1a1b26,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# ─────────────────────────────────────────────
#  Key bindings
# ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits open in current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Pane navigation (prefix-free)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Window navigation
bind -n M-Left previous-window
bind -n M-Right next-window
