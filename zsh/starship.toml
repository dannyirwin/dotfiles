# ~/.config/starship.toml
# Tokyo Night prompt — https://starship.rs
# Dotfiles: github.com/yourname/dotfiles

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

# ─────────────────────────────────────────────
#  Directory
# ─────────────────────────────────────────────
[directory]
style           = "bold #7aa2f7"
truncation_length = 4
truncate_to_repo  = true
format          = "[$path]($style)[$read_only]($read_only_style) "

# ─────────────────────────────────────────────
#  Git
# ─────────────────────────────────────────────
[git_branch]
style  = "#9ece6a"
symbol = " "
format = "on [$symbol$branch]($style) "

[git_status]
style     = "#f7768e"
format    = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
stashed    = "≡"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

# ─────────────────────────────────────────────
#  Languages (only show when relevant)
# ─────────────────────────────────────────────
[python]
style  = "#7dcfff"
symbol = " "
format = "[$symbol$pyenv_prefix($version)(\\($virtualenv\\))]($style) "

[nodejs]
style  = "#9ece6a"
symbol = " "
format = "[$symbol($version)]($style) "

[rust]
style  = "#f7768e"
symbol = " "
format = "[$symbol($version)]($style) "

[golang]
style  = "#7dcfff"
symbol = " "
format = "[$symbol($version)]($style) "

# ─────────────────────────────────────────────
#  Prompt character
# ─────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #7aa2f7)"
error_symbol   = "[❯](bold #f7768e)"
vimcmd_symbol  = "[❮](bold #9ece6a)"

# ─────────────────────────────────────────────
#  Command duration (only show if > 2s)
# ─────────────────────────────────────────────
[cmd_duration]
min_time          = 2000
style             = "#e0af68"
format            = "took [$duration]($style) "
show_notifications = false
